<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coletor Nexus-Alpha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-4 font-sans">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-lg p-6">
        <h1 class="text-2xl font-bold mb-6 text-center text-indigo-600">📍 Coletor de Preços</h1>
        
        <label class="block mb-2 font-bold text-gray-700">Categoria:</label>
        <select id="categoria" class="w-full p-4 mb-4 border rounded-lg text-lg bg-gray-50">
            <option value="Supermercado">🛒 Supermercado</option>
            <option value="Posto">⛽ Posto (Combustível)</option>
            <option value="Saude">💊 Saúde (Farmácia)</option>
            <option value="Gas">🔥 Gás de Cozinha</option>
        </select>

        <input type="text" id="item" placeholder="Nome do Item (Ex: Gasolina)" class="w-full p-4 mb-4 border rounded-lg text-lg">
        <input type="number" id="preco" placeholder="Preço (Ex: 5.89)" step="0.01" class="w-full p-4 mb-4 border rounded-lg text-lg">
        <input type="text" id="loja" placeholder="Nome da Loja/Posto" class="w-full p-4 mb-4 border rounded-lg text-lg">

        <button onclick="salvar()" id="btnSalvar" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-lg shadow-md active:bg-indigo-800 transition text-xl">
            🚀 SALVAR E LOCALIZAR
        </button>
        <p id="status" class="mt-4 text-center text-sm font-medium"></p>
    </div>

    <script>
        // Aqui usaremos as chaves que você pegou no Supabase
        const SUPABASE_URL = "sb_publishable_qDohqO5EFdoIXvZQ57y2ZQ_mzhEcOaJ";
        const SUPABASE_KEY = "sb_secret_4tl398RzTYTy1x05dP150w_jGn_CkKD";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function salvar() {
            const btn = document.getElementById('btnSalvar');
            const status = document.getElementById('status');
            btn.disabled = true;
            status.innerText = "🛰️ Capturando GPS...";

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const dados = {
                    categoria: document.getElementById('categoria').value,
                    item_nome: document.getElementById('item').value,
                    preco: parseFloat(document.getElementById('preco').value),
                    loja_nome: document.getElementById('loja').value,
                    latitude: pos.coords.latitude,
                    longitude: pos.coords.longitude
                };

                status.innerText = "☁️ Enviando para nuvem...";
                const { error } = await supabase.from('registros_precos').insert([dados]);

                if (error) {
                    status.innerText = "❌ Erro: " + error.message;
                    status.className = "mt-4 text-center text-red-500";
                } else {
                    status.innerText = "✅ Preço salvo com sucesso!";
                    status.className = "mt-4 text-center text-green-500";
                    document.getElementById('item').value = "";
                    document.getElementById('preco').value = "";
                }
                btn.disabled = false;
            }, (err) => {
                status.innerText = "📍 Erro no GPS. Verifique as permissões.";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
